  <!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Secreto</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

  <div class="container">

    <h1>🧩 Código Secreto</h1>

    <!-- LOGIN -->
    <div id="loginBox" class="card">

      <h2>🔐 Login</h2>

    <form onsubmit="login(); return false;">
      <input id="user" placeholder="Usuário">
      <input id="pass" type="password" placeholder="Senha">
      <button type="submit" class="btn-primary">Entrar</button>
    </form>

      <p id="error" class="error"></p>

    </div>

    <!-- JOGO -->
    <div id="game" class="card hidden">

      <p id="welcome"></p>

      <!-- CADEADO -->
      <div class="lock">
        <div class="lock-body">
          <div class="lock-shackle"></div>
          <div class="lock-hole"></div>
        </div>
      </div>

      <p id="info"></p>

      <!-- NÍVEL -->
  <div class="nivel-box">
    <span class="nivel-label">🎮 Nível</span>

    <select id="nivel" onchange="mudarNivel()">
      <option value="facil">Fácil</option>
      <option value="medio">Médio</option>
      <option value="dificil">Difícil</option>
      <option value="impossivel">Impossível</option>
    </select>
  </div>

      <!-- INPUT + BOTÃO -->
      <div class="input-group">
        <input id="palpite"
              placeholder="1234"
              onkeydown="if(event.key==='Enter') jogar()">

        <button onclick="reset()">Reiniciar</button>
      </div>

    </div>

    <!-- LOG (fora do card) -->
    <div id="log"></div>

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <h2>🎉 Vitória!</h2>
      <p id="popup-text"></p>
  <button class="btn-primary btn-success" onclick="reiniciarJogo()">Jogar novamente</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Código Secreto • Desenvolvido por Gerleidson A. Bomfim</p>
  </footer>

  <script src="script.js"></script>

  </body>
  </html>
